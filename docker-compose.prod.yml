services:
  db:
    image: pgvector/pgvector:pg16
    container_name: heritage-rag-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-heritage_rag}
      POSTGRES_USER: ${POSTGRES_USER:-heritage}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    image: heritage-rag-kakao-api:local
    build:
      context: ./backend
    container_name: heritage-rag-api-prod
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-.env.production}
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-heritage}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-heritage_rag}
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
