name: Deploy to Mac mini

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: heritage-rag-kakao-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy on self-hosted Mac mini runner
    runs-on: [self-hosted, macOS, heritage-rag]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write production env from GitHub Secret
        env:
          PRODUCTION_ENV: ${{ secrets.PRODUCTION_ENV }}
        run: |
          test -n "$PRODUCTION_ENV" || {
            echo 'Missing GitHub Secret: PRODUCTION_ENV' >&2
            exit 1
          }
          printf '%s\n' "$PRODUCTION_ENV" > .env.production
          chmod 600 .env.production

      - name: Deploy with Docker Compose
        run: ./scripts/deploy.sh
