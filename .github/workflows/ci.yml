name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  static-check:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Python syntax check
        run: python -m compileall backend/app scripts/collect_heritages.py

      - name: Docker Compose config check - dev
        run: APP_ENV_FILE=.env.example docker compose --env-file .env.example config >/dev/null

      - name: Docker Compose config check - prod
        run: docker compose -f docker-compose.prod.yml --env-file .env.production.example config >/dev/null

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build API image
        run: docker build ./backend -t heritage-rag-api:ci

      - name: Build frontend image
        run: docker build ./frontend -t heritage-rag-frontend:ci
