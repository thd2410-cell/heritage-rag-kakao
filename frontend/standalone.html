<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>국가유산 AI 해설사</title>
  <!-- React + Babel CDN: 빌드 도구 없이 바로 동작 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, sans-serif;
      background: #f4f1ea;
      color: #2b2b2b;
    }
    .app { max-width: 720px; margin: 0 auto; padding: 24px 16px 64px; }
    h1 { font-size: 22px; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #8a7f66; font-size: 13px; margin-bottom: 20px; }
    .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .search-row input {
      flex: 1; padding: 12px 14px; font-size: 15px;
      border: 1px solid #d6cdb8; border-radius: 8px; outline: none;
    }
    .search-row input:focus { border-color: #a98b4b; }
    .search-row button {
      padding: 12px 18px; font-size: 15px; font-weight: 600; cursor: pointer;
      background: #6b4f2a; color: #fff; border: none; border-radius: 8px;
    }
    .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .lang-row { display: flex; gap: 8px; margin-bottom: 20px; }
    .lang-row button {
      flex: 1; padding: 8px 0; font-size: 14px; cursor: pointer;
      background: #fff; border: 1px solid #d6cdb8; border-radius: 8px; color: #6b4f2a;
    }
    .lang-row button.active { background: #a98b4b; color: #fff; border-color: #a98b4b; }
    .card {
      background: #fff; border: 1px solid #e6ddc8; border-radius: 12px;
      padding: 18px; box-shadow: 0 2px 8px rgba(107,79,42,0.06);
    }
    .card img { width: 100%; border-radius: 8px; margin-bottom: 14px; object-fit: cover; max-height: 320px; }
    .name { font-size: 19px; font-weight: 700; margin: 0 0 2px; }
    .meta { color: #8a7f66; font-size: 13px; margin-bottom: 12px; }
    .explanation { line-height: 1.7; font-size: 15px; white-space: pre-wrap; }
    .terms { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
    .term-chip {
      background: #f0ead9; color: #6b4f2a; font-size: 12px;
      padding: 4px 10px; border-radius: 999px;
    }
    .note { margin-top: 12px; font-size: 12px; color: #b06a3a; background: #fbf3ec; padding: 8px 10px; border-radius: 6px; }
    .expand-row { margin-top: 12px; }
    .expand-row button { font-size: 12px; padding: 6px 12px; cursor: pointer; background: #fff; border: 1px dashed #a98b4b; color: #6b4f2a; border-radius: 8px; display: inline-flex; align-items: center; gap: 6px; }
    .expand-row button:disabled { opacity: 0.6; cursor: not-allowed; }
    .expand-msg { margin-top: 8px; font-size: 12px; color: #5a7a4a; background: #f1f6ec; padding: 8px 10px; border-radius: 6px; }
    /* 후속 질문 채팅 */
    .chat { margin-top: 16px; }
    .chat-title { font-size: 13px; font-weight: 600; color: #6b4f2a; margin-bottom: 8px; }
    .chat-log { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .bubble { padding: 9px 12px; border-radius: 12px; font-size: 14px; line-height: 1.55; max-width: 88%; white-space: pre-wrap; }
    .bubble.user { align-self: flex-end; background: #6b4f2a; color: #fff; border-bottom-right-radius: 3px; }
    .bubble.bot { align-self: flex-start; background: #f0ead9; color: #2b2b2b; border-bottom-left-radius: 3px; }
    .bubble.thinking { align-self: flex-start; background: #f0ead9; color: #8a7f66; display: flex; align-items: center; gap: 8px; }
    .mini-spinner { width: 14px; height: 14px; border: 2px solid #d6cdb8; border-top-color: #6b4f2a; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .chat-input-row { display: flex; gap: 6px; }
    .chat-input-row input { flex: 1; padding: 9px 12px; font-size: 14px; border: 1px solid #d6cdb8; border-radius: 8px; outline: none; }
    .chat-input-row input:focus { border-color: #a98b4b; }
    .chat-input-row button { padding: 9px 14px; font-size: 14px; cursor: pointer; background: #a98b4b; color: #fff; border: none; border-radius: 8px; }
    .chat-input-row button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #c0392b; text-align: center; padding: 16px; }
    .empty { text-align: center; color: #b3a98c; padding: 40px 0; }
    /* 로딩 스피너 */
    .spinner-wrap { display: flex; flex-direction: column; align-items: center; padding: 40px 0; color: #8a7f66; }
    .spinner {
      width: 36px; height: 36px; border: 4px solid #e6ddc8;
      border-top-color: #6b4f2a; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // FastAPI 백엔드 주소
    const API_BASE = "http://localhost:8000";

    const LANGS = [
      { code: "ko", label: "한국어" },
      { code: "en", label: "English" },
      { code: "zh", label: "中文" },
      { code: "ja", label: "日本語" },
    ];

    function App() {
      const [name, setName] = useState("");
      const [lang, setLang] = useState("ko");
      const [loading, setLoading] = useState(false);
      const [data, setData] = useState(null);
      const [error, setError] = useState("");
      // 후속 질문 채팅 상태
      const [chat, setChat] = useState([]);      // [{q, a}]
      const [followQ, setFollowQ] = useState("");
      const [asking, setAsking] = useState(false);
      // 용어 사전 자동 확장 상태
      const [expanding, setExpanding] = useState(false);
      const [expandMsg, setExpandMsg] = useState("");

      async function search(searchLang) {
        const useLang = searchLang || lang;
        if (!name.trim()) {
          setError("유산 이름을 입력해 주세요.");
          return;
        }
        setLoading(true);
        setError("");
        try {
          const url = `${API_BASE}/api/heritage?name=${encodeURIComponent(name.trim())}&lang=${useLang}`;
          const res = await fetch(url);
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.detail || `요청 실패 (HTTP ${res.status})`);
          }
          const json = await res.json();
          setData(json);
          setChat([]);          // 새 유산이면 대화 초기화
          setExpandMsg("");     // 확장 메시지 초기화
        } catch (e) {
          setData(null);
          setError(e.message || "오류가 발생했습니다.");
        } finally {
          setLoading(false);
        }
      }

      async function sendFollow() {
        const q = followQ.trim();
        if (!q || !data || asking) return;
        setAsking(true);
        setFollowQ("");
        try {
          const res = await fetch(`${API_BASE}/api/ask`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              name: data.name,
              hanja: data.hanja,
              content: data.content,   // grounding 원문
              lang: lang,
              question: q,
              history: chat,           // 이전 Q&A 맥락
            }),
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.detail || `요청 실패 (HTTP ${res.status})`);
          }
          const json = await res.json();
          setChat((prev) => [...prev, { q, a: json.answer }]);
        } catch (e) {
          setChat((prev) => [...prev, { q, a: "⚠️ " + (e.message || "오류가 발생했습니다.") }]);
        } finally {
          setAsking(false);
        }
      }

      async function expandTerms() {
        if (!data || expanding) return;
        setExpanding(true);
        setExpandMsg("");
        try {
          const res = await fetch(`${API_BASE}/api/expand-terms`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ content: data.content }),
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            throw new Error(body.detail || `요청 실패 (HTTP ${res.status})`);
          }
          const json = await res.json();
          if (json.added_count > 0) {
            const names = json.added.map((a) => `${a.term}(${a.hanja})`).join(", ");
            setExpandMsg(`✅ 새 용어 ${json.added_count}개 사전 등록: ${names}`);
          } else {
            setExpandMsg("새로 등록할 전문 용어가 없습니다. (고유명사는 자동 제외)");
          }
        } catch (e) {
          setExpandMsg("⚠️ " + (e.message || "오류가 발생했습니다."));
        } finally {
          setExpanding(false);
        }
      }

      function onPickLang(code) {
        setLang(code);
        // 이미 검색 결과가 있으면 언어 바꿔 즉시 재조회
        if (data || name.trim()) search(code);
      }

      return (
        <div className="app">
          <h1>🏛️ 국가유산 AI 해설사</h1>
          <div className="subtitle">유산 이름을 입력하면 AI가 해설해 드립니다</div>

          <div className="search-row">
            <input
              type="text"
              placeholder="예) 숭례문, 불국사, 석굴암"
              value={name}
              onChange={(e) => setName(e.target.value)}
              onKeyDown={(e) => e.key === "Enter" && search()}
            />
            <button onClick={() => search()} disabled={loading}>
              검색
            </button>
          </div>

          <div className="lang-row">
            {LANGS.map((l) => (
              <button
                key={l.code}
                className={lang === l.code ? "active" : ""}
                onClick={() => onPickLang(l.code)}
              >
                {l.label}
              </button>
            ))}
          </div>

          {loading && (
            <div className="spinner-wrap">
              <div className="spinner"></div>
              <div>해설을 불러오는 중...</div>
            </div>
          )}

          {!loading && error && <div className="error">⚠️ {error}</div>}

          {!loading && !error && !data && (
            <div className="empty">검색어를 입력하고 검색해 보세요.</div>
          )}

          {!loading && !error && data && (
            <div className="card">
              {data.imageUrl && <img src={data.imageUrl} alt={data.name} />}
              <p className="name">{data.name}</p>
              <p className="meta">
                {data.hanja} {data.period ? `· ${data.period}` : ""}
              </p>
              <div className="explanation">{data.explanation}</div>

              {data.detected_terms && data.detected_terms.length > 0 && (
                <div className="terms">
                  {data.detected_terms.map((t) => (
                    <span key={t} className="term-chip">{t}</span>
                  ))}
                </div>
              )}

              {/* 용어 사전 자동 확장 */}
              <div className="expand-row">
                <button onClick={expandTerms} disabled={expanding}>
                  {expanding ? (
                    <span><span className="mini-spinner"></span> 용어 분석 중...</span>
                  ) : (
                    "🔍 사전에 없는 용어 자동 등록"
                  )}
                </button>
                {expandMsg && <div className="expand-msg">{expandMsg}</div>}
              </div>

              {data.note && <div className="note">ℹ️ {data.note}</div>}

              {/* 후속 질문 채팅 — 현재 유산을 기억하고 대화 */}
              <div className="chat">
                <div className="chat-title">💬 이 유산에 대해 더 물어보기</div>
                {(chat.length > 0 || asking) && (
                  <div className="chat-log">
                    {chat.map((t, i) => (
                      <React.Fragment key={i}>
                        <div className="bubble user">{t.q}</div>
                        <div className="bubble bot">{t.a}</div>
                      </React.Fragment>
                    ))}
                    {asking && (
                      <div className="bubble thinking">
                        <span className="mini-spinner"></span> 생각하는 중...
                      </div>
                    )}
                  </div>
                )}
                <div className="chat-input-row">
                  <input
                    type="text"
                    placeholder="예) 그 지붕은 왜 그런 모양이야?"
                    value={followQ}
                    onChange={(e) => setFollowQ(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && sendFollow()}
                    disabled={asking}
                  />
                  <button onClick={sendFollow} disabled={asking || !followQ.trim()}>
                    질문
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
