services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:8081
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://127.0.0.1:8081
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SERVER_PORT: 8080
      AI_SERVER_URL: http://ai-server:8000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8081:8080"
    depends_on:
      - ai-server
      - redis

  ai-server:
    build:
      context: .
      dockerfile: ai-server/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://heritage:heritage@postgres:5432/heritage
      REDIS_URL: redis://redis:6379/0
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      LLM_PROVIDER: ${LLM_PROVIDER:-dummy}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_DIMENSIONS: 1536
      VECTOR_SEARCH_LIMIT: 80
      AUTO_CONFIRM_ENTITY_THRESHOLD: 0.86
      CONFIRM_ENTITY_THRESHOLD: 0.78
      DEFAULT_TOP_K: 8
    ports:
      - "8000:8000"
    volumes:
      - ./ai-server/data:/app/ai-server/data:ro
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: heritage
      POSTGRES_PASSWORD: heritage
      POSTGRES_DB: heritage
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    expose:
      - "6379"

volumes:
  postgres_data:
