apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: heritage-chatbot
spec:
  replicas: 1
  selector:
    matchLabels: {app: postgres}
  template:
    metadata:
      labels: {app: postgres}
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom: {secretKeyRef: {name: heritage-secret, key: POSTGRES_USER}}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: heritage-secret, key: POSTGRES_PASSWORD}}
            - name: POSTGRES_DB
              valueFrom: {secretKeyRef: {name: heritage-secret, key: POSTGRES_DB}}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: heritage-chatbot
spec:
  selector: {app: postgres}
  ports:
    - port: 5432
      targetPort: 5432
