apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-server
  namespace: heritage-chatbot
spec:
  replicas: 2
  selector:
    matchLabels: {app: ai-server}
  template:
    metadata:
      labels: {app: ai-server}
    spec:
      containers:
        - name: ai-server
          image: heritage-ai-server:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef: {name: heritage-config}
            - secretRef: {name: heritage-secret}
          readinessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /health, port: 8000}
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: ai-server
  namespace: heritage-chatbot
spec:
  selector: {app: ai-server}
  ports:
    - port: 8000
      targetPort: 8000
